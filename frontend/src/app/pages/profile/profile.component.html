<div class="app-shell">
  <app-sidebar></app-sidebar>

  <main class="app-main">
    <div class="app-main-header">
      <div>
        <h1 style="font-family: 'Poppins';">Mon profil</h1>
        <p>Gérez vos informations personnelles, votre mot de passe et l'apparence de l'application.</p>
      </div>
      <div class="app-header-actions">
        <app-theme-toggle></app-theme-toggle>
      </div>
    </div>

    <div class="panel settings-section">
      <div class="settings-section-title">Photo de profil</div>
      <div class="avatar-upload-row">
        <button type="button" class="avatar-upload-circle large" (click)="avatarFileInput.click()" title="Changer la photo de profil">
          @if (avatarDataUrl) {
            <img [src]="avatarDataUrl" alt="">
          } @else {
            <svg class="placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a7 7 0 0114 0v1"/></svg>
          }
          <span class="avatar-upload-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
          </span>
        </button>
        <input type="file" #avatarFileInput accept="image/*" hidden (change)="onAvatarSelected($event)">
        <div class="avatar-upload-text">
          <span>Changer la photo</span>
          <small>PNG ou JPG, 5 Mo maximum</small>
        </div>
      </div>
    </div>

    <div class="panel settings-section">
      <div class="settings-section-title">Informations personnelles</div>
      <div class="fields-row">
        <div class="field">
          <label for="profileFirstName">Prénom</label>
          <input type="text" id="profileFirstName" [(ngModel)]="firstName" placeholder="Ahmed">
        </div>
        <div class="field">
          <label for="profileLastName">Nom</label>
          <input type="text" id="profileLastName" [(ngModel)]="lastName" placeholder="Ben Salah">
        </div>
      </div>
      <div class="field">
        <label for="profileEmail">Email</label>
        <input type="email" id="profileEmail" [(ngModel)]="email" placeholder="vous@exemple.com">
      </div>
      <button class="btn-primary" style="margin-top:4px" (click)="saveInfo()">Enregistrer les modifications</button>
    </div>

    <div class="panel settings-section">
      <div class="settings-section-title">Mot de passe</div>
      <div class="field">
        <label for="profileNewPassword">Nouveau mot de passe</label>
        <input type="password" id="profileNewPassword" [(ngModel)]="newPassword" placeholder="8 caractères minimum">
      </div>
      <div class="field" style="margin-bottom:4px">
        <label for="profileConfirmPassword">Confirmer le mot de passe</label>
        <input type="password" id="profileConfirmPassword" [(ngModel)]="confirmPassword" placeholder="Répétez le mot de passe">
      </div>
      <button class="btn-secondary" (click)="savePassword()">Mettre à jour le mot de passe</button>
    </div>

    <div class="panel settings-section">
      <div class="settings-section-title">Apparence</div>
      <div class="theme-choice-group">
        <button type="button" class="theme-choice" [class.selected]="themeService.theme() === 'light'" (click)="selectTheme('light')">
          <div class="theme-swatch light-swatch"></div>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          <span>Mode clair</span>
        </button>
        <button type="button" class="theme-choice" [class.selected]="themeService.theme() === 'dark'" (click)="selectTheme('dark')">
          <div class="theme-swatch dark-swatch"></div>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          <span>Mode sombre</span>
        </button>
      </div>
    </div>

    <div class="panel settings-section">
      <div class="settings-section-title">Session</div>
      <button class="btn-danger-outline" (click)="logOut()">Se déconnecter</button>
    </div>
  </main>
</div>
